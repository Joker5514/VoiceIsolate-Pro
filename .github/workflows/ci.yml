name: CI — Lint, Test & Validate

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest test suite
        run: npm run test

      - name: Run test coverage
        run: npm run test:coverage

      - name: Run pipeline validation
        run: npm run validate

  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check critical files exist
        run: |
          for f in \
            public/index.html \
            public/app/index.html \
            public/app/style.css \
            public/app/mobile.css \
            public/app/app.js \
            public/app/dsp-core.js \
            public/app/dsp-processor.js \
            public/app/ml-worker.js \
            public/app/dsp-worker.js \
            public/app/pipeline-orchestrator.js \
            public/app/pipeline-state.js \
            public/app/ring-buffer.js \
            public/blueprint/index.html \
            public/manifest.json \
            capacitor.config.json \
            vercel.json; do
            [ -f "$f" ] && echo "✓ $f" || (echo "✗ MISSING: $f" && exit 1)
          done

      - name: Validate HTML structure
        run: |
          for group in gate nr eq dyn spec adv sep out; do
            grep -q "data-tab=\"$group\"" public/app/index.html && echo "✓ Tab: $group" || echo "⚠ Missing tab: $group"
          done

      - name: Validate version consistency
        run: |
          PKG_VER=$(node -e "const p=require('./package.json'); console.log(p.version)")
          HTML_VER=$(grep -o 'v[0-9]*\.[0-9]*' public/app/index.html | head -1 | tr -d 'v')
          echo "package.json: $PKG_VER"
          echo "index.html: $HTML_VER"
          # Check major version matches
          PKG_MAJOR=$(echo $PKG_VER | cut -d. -f1)
          HTML_MAJOR=$(echo $HTML_VER | cut -d. -f1)
          [ "$PKG_MAJOR" = "$HTML_MAJOR" ] && echo "✓ Version major matches" || echo "⚠ Version mismatch: pkg=$PKG_VER html=$HTML_VER"

      - name: Check single-pass spectral architecture
        run: |
          STFT_COUNT=$(grep -c "forwardSTFT\|inverseSTFT" public/app/app.js 2>/dev/null || echo 0)
          echo "STFT call count in app.js: $STFT_COUNT"

      - name: Validate file sizes
        run: |
          for f in public/app/app.js public/app/dsp-core.js public/app/dsp-processor.js public/app/ml-worker.js; do
            SIZE=$(wc -c < "$f")
            echo "$f: ${SIZE} bytes"
            [ "$SIZE" -gt 1000 ] && echo "✓ $f has content" || (echo "✗ $f too small" && exit 1)
          done

      - name: Validate Capacitor config
        run: |
          node -e "
            const cfg = require('./capacitor.config.json');
            console.log('App ID:', cfg.appId);
            console.log('App Name:', cfg.appName);
            console.log('Web Dir:', cfg.webDir);
            if (!cfg.appId || !cfg.appName || !cfg.webDir) {
              console.error('Invalid capacitor.config.json');
              process.exit(1);
            }
            console.log('✓ capacitor.config.json is valid');
          "

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
