name: CI & Deploy


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]




# Restrict GITHUB_TOKEN permissions to minimum required
permissions:
  contents: read


env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.0.0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm run lint
      - name: Run tests
        run: pnpm run test
      - name: Run validation
        run: pnpm run validate


  smoke-test:
    name: Live Browser Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.0.0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate ONNX model CDN URLs
        run: node --input-type=module scripts/validate-onnx-models.js
        continue-on-error: true  # warn but don't block smoke test (models may not be uploaded yet in PR context)
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Run live browser smoke test
        run: pnpm test:live


  validate:
    name: Validate Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
      - name: Check critical files exist
        run: |
          for f in public/index.html public/app/index.html public/app/style.css public/app/app.js public/blueprint/index.html vercel.json; do
            [ -f "$f" ] && echo "✓ $f" || (echo "✗ MISSING: $f" && exit 1)
          done
      - name: Validate HTML structure
        run: |
          # Check app.js has all slider groups
          for group in gate nr eq; do
            grep -q "$group:" public/app/app.js && echo "✓ Slider group: $group" || echo "⚠ Missing slider group: $group"
          done
      - name: Check single-pass spectral architecture
        run: |
          # Ensure no multiple STFT/iSTFT patterns (architectural violation)
          STFT_COUNT=$(grep -c "stft|STFT|forwardFFT" public/app/app.js 2>/dev/null || echo 0)
          echo "STFT references: $STFT_COUNT"
      - name: Validate file sizes
        run: |
          APP_SIZE=$(wc -c < public/app/app.js)
          echo "app.js: ${APP_SIZE} bytes"
          [ "$APP_SIZE" -gt 1000 ] && echo "✓ app.js has content" || (echo "✗ app.js too small" && exit 1)


  validate-models:
    name: Validate ONNX Model CDN URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
      - name: Check ONNX models are real binaries on HuggingFace CDN
        run: node --input-type=module scripts/validate-onnx-models.js


  deploy-preview:
    name: Deploy Preview
    needs: [lint-test, validate, smoke-test, validate-models]
    if: github.event_name == 'pull_request' && secrets.VERCEL_TOKEN != ''
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel Environment
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
      - name: Deploy Preview
        if: env.VERCEL_TOKEN != ''
        run: vercel deploy --token=$VERCEL_TOKEN
      - name: Skip deploy (no VERCEL_TOKEN configured)
        if: env.VERCEL_TOKEN == ''
        run: echo "⚠️  Skipping Vercel preview deploy — VERCEL_TOKEN secret not configured. Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in GitHub repository secrets to enable deployments."


  deploy-production:
    name: Deploy Production
    needs: [lint-test, validate, smoke-test, validate-models]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.VERCEL_TOKEN != ''
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel Environment
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - name: Deploy Production
        if: env.VERCEL_TOKEN != ''
        run: vercel deploy --prod --token=$VERCEL_TOKEN
      - name: Skip deploy (no VERCEL_TOKEN configured)
        if: env.VERCEL_TOKEN == ''
        run: echo "⚠️  Skipping Vercel production deploy — VERCEL_TOKEN secret not configured. Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in GitHub repository secrets to enable deployments."
