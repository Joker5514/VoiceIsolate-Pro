name: Delete Merged Branches

"on":
  # Run automatically when a PR is merged
  pull_request:
    types: [closed]
  # Allow manual one-time cleanup run
  workflow_dispatch:

jobs:
  delete-merged-branch:
    name: Delete Merged Branch
    runs-on: ubuntu-latest
    # For automatic runs, only proceed when the PR was actually merged (not just closed)
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Delete the merged PR branch
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          # Never delete the default branch
          if [ "$BRANCH" = "main" ]; then
            echo "Skipping default branch: $BRANCH"
            exit 0
          fi
          echo "Deleting merged branch: $BRANCH"
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/git/refs/heads/${BRANCH}" \
            && echo "✓ Deleted: $BRANCH" \
            || echo "⚠ Could not delete $BRANCH (may already be deleted)"

      - name: Delete all previously merged branches (manual cleanup)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all merged PRs and deleting their head branches..."
          REPO="${{ github.repository }}"
          DELETED=0
          SKIPPED=0
          FAILED=0

          # Get all merged PRs (paginate through all pages)
          PAGE=1
          while true; do
            RESPONSE=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/pulls?state=closed&per_page=100&page=${PAGE}")

            # Stop when the page returns no items
            COUNT=$(echo "$RESPONSE" | jq 'length')
            [ "$COUNT" -eq 0 ] && break

            # Extract branches from merged PRs; guard against null .head (deleted forks)
            BRANCHES=$(echo "$RESPONSE" | jq -r \
              '.[] | select(.merged_at != null and .head != null) | .head.ref')

            while IFS= read -r branch; do
              # Skip empty lines and the default branch
              [ -z "$branch" ] && continue
              [ "$branch" = "main" ] && continue

              # Attempt deletion and capture any error output
              DELETE_ERR=$(gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                "/repos/${REPO}/git/refs/heads/${branch}" 2>&1)
              EXIT_CODE=$?

              if [ $EXIT_CODE -eq 0 ]; then
                echo "✓ Deleted: $branch"
                DELETED=$((DELETED+1))
              else
                # Check if the failure is because the branch no longer exists
                ERROR_MSG=$(echo "$DELETE_ERR" | jq -r '.message // ""' 2>/dev/null || echo "")
                if echo "$ERROR_MSG" | grep -qi "reference does not exist"; then
                  echo "— Already gone: $branch"
                  SKIPPED=$((SKIPPED+1))
                else
                  echo "✗ Failed: $branch (${ERROR_MSG:-$DELETE_ERR})"
                  FAILED=$((FAILED+1))
                fi
              fi
            done <<< "$BRANCHES"

            PAGE=$((PAGE+1))
            # If fewer than 100 results, we've reached the last page
            [ "$COUNT" -lt 100 ] && break
          done

          echo ""
          echo "=== Summary ==="
          echo "Deleted:  $DELETED"
          echo "Skipped:  $SKIPPED"
          echo "Failed:   $FAILED"
